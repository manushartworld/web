<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy | Manushart</title>
    
    <link rel="icon" type="image/png" href="manushart-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;800&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00d4ff; --bg: #050505; --card: #111; --text: #f0f0f0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 40px 20px;
            line-height: 1.8;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lang-switcher {
            position: fixed; top: 20px; right: 20px; z-index: 100; display: flex; gap: 10px;
        }
        .lang-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid #333; color: #fff;
            padding: 8px 12px; border-radius: 8px; cursor: pointer; font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem; transition: 0.3s;
        }
        .lang-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(0, 212, 255, 0.1); }

        .container { 
            max-width: 800px; 
            width: 100%;
            background: var(--card);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid #1a1a1a;
            box-sizing: border-box;
            z-index: 1;
        }

        h1 { 
            font-family: 'Orbitron', sans-serif; 
            color: #fff; 
            border-bottom: 2px solid var(--primary); 
            padding-bottom: 15px;
            font-size: 1.8rem;
            letter-spacing: 2px;
        }

        h2 { 
            font-family: 'Orbitron', sans-serif; 
            color: var(--primary); 
            margin-top: 35px; 
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        p, li { color: #aaa; font-size: 1rem; }
        strong { color: #fff; }
        a { color: var(--primary); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .back-link { 
            display: inline-block; 
            margin-top: 40px; 
            color: var(--primary); 
            text-decoration: none; 
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .back-link:hover { text-shadow: 0 0 10px var(--primary); transform: translateX(-5px); }

        @media (max-width: 600px) {
            body { padding: 60px 15px 20px 15px; }
            .container { padding: 25px; }
            h1 { font-size: 1.4rem; }
            h2 { font-size: 1rem; }
            p { font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <div class="lang-switcher">
        <button class="lang-btn" id="btn-tr" onclick="setLanguage('tr')">TR</button>
        <button class="lang-btn" id="btn-en" onclick="setLanguage('en')">EN</button>
    </div>

    <div class="container">
        <h1 id="text-h1">Privacy Policy</h1>
        <p><strong id="text-date-label">Effective Date:</strong> <span id="text-date">April 19, 2026</span></p>
        
        <p id="text-welcome"></p>

        <h2 id="text-h2-1">1. Data Collection</h2>
        <p id="text-p1"></p>

        <h2 id="text-h2-2">2. Permissions</h2>
        <p id="text-p2"></p>

        <h2 id="text-h2-3">3. Third-Party Services</h2>
        <p id="text-p3"></p>

        <h2 id="text-h2-4">4. Contact Us</h2>
        <p id="text-p4"></p>

        <a href="index.html" class="back-link" id="btn-back">&larr; BACK TO HOME</a>
    </div>

    <script>
        const translations = {
            en: {
                h1: "Privacy Policy",
                dateLabel: "Effective Date:",
                date: "April 19, 2026",
                welcome: "Welcome to <strong>Manushart</strong>. This policy specifically covers <strong>Knight Legion: Rpg Strategy</strong> and all other games published under the Manushart developer account.",
                h2_1: "1. Data Collection",
                p1: "Our applications do not collect personal identification information (PII) directly. However, we use third-party services like AdMob that may collect device identifiers (Advertising IDs) to serve personalized ads.",
                h2_2: "2. Permissions",
                p2: "We request only necessary permissions (such as Internet access) for the game to function. We do not sell or share user data with third parties for marketing purposes.",
                h2_3: "3. Third-Party Services",
                p3: "This game uses <strong>Google Play Services</strong> and <strong>AdMob</strong>. These services have their own privacy policies. You can find Google's policy here: <a href='https://policies.google.com/privacy' target='_blank'>Google Privacy Policy</a>.",
                h2_4: "4. Contact Us",
                p4: "If you have any questions regarding your privacy while playing <strong>Knight Legion: Rpg Strategy</strong>, contact us at: <strong>manushartworld@gmail.com</strong>",
                back: "← BACK TO HOME"
            },
            tr: {
                h1: "Gizlilik Politikası",
                dateLabel: "Yürürlük Tarihi:",
                date: "19 Nisan 2026",
                welcome: "<strong>Manushart</strong>'a hoş geldiniz. Bu politika özellikle <strong>Knight Legion: Rpg Strategy</strong> oyununu ve Manushart hesabı altındaki tüm uygulamaları kapsamaktadır.",
                h2_1: "1. Veri Toplama",
                p1: "Uygulamalarımız doğrudan kişisel bilgi toplamaz. Ancak, kişiselleştirilmiş reklamlar sunmak için cihaz kimliklerini (Reklam Kimlikleri) toplayabilen AdMob gibi üçüncü taraf hizmetler kullanmaktayız.",
                h2_2: "2. İzinler",
                p2: "Yalnızca oyunun çalışması için gerekli olan izinleri (İnternet erişimi gibi) talep ediyoruz. Kullanıcı verilerini pazarlama amacıyla üçüncü taraflarla paylaşmıyoruz.",
                h2_3: "3. Üçüncü Taraf Hizmetleri",
                p3: "Bu oyun <strong>Google Play Hizmetleri</strong> ve <strong>AdMob</strong> kullanır. Bu hizmetlerin kendi politikaları vardır. Google politikasına buradan ulaşabilirsiniz: <a href='https://policies.google.com/privacy' target='_blank'>Google Gizlilik Politikası</a>.",
                h2_4: "4. Bize Ulaşın",
                p4: "<strong>Knight Legion: Rpg Strategy</strong> oynarken gizliliğinizle ilgili bir sorunuz olursa bize ulaşın: <strong>manushartworld@gmail.com</strong>",
                back: "← ANA SAYFAYA DÖN"
            }
        };

        function setLanguage(lang) {
            document.getElementById('text-h1').innerText = translations[lang].h1;
            document.getElementById('text-date-label').innerText = translations[lang].dateLabel;
            document.getElementById('text-date').innerText = translations[lang].date;
            document.getElementById('text-welcome').innerHTML = translations[lang].welcome;
            document.getElementById('text-h2-1').innerText = translations[lang].h2_1;
            document.getElementById('text-p1').innerText = translations[lang].p1;
            document.getElementById('text-h2-2').innerText = translations[lang].h2_2;
            document.getElementById('text-p2').innerText = translations[lang].p2;
            document.getElementById('text-h2-3').innerHTML = translations[lang].p3;
            document.getElementById('text-h2-4').innerHTML = translations[lang].p4;
            document.getElementById('btn-back').innerText = translations[lang].back;

            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
            localStorage.setItem('preferredLang', lang);
        }

        window.onload = function() {
            const savedLang = localStorage.getItem('preferredLang') || 'en';
            setLanguage(savedLang);
        };
    </script>
</body>
</html>
