<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knight Legion | Manushart</title>
    
    <link rel="icon" type="image/png" href="manushart-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;800&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00d4ff; --bg: #0a0a0a; --card: #111; --text: #f0f0f0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 60px 20px; 
            text-align: center; 
            overflow-x: hidden;
        }

        .lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 100; display: flex; gap: 10px; }
        .lang-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid #333; color: #fff; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 0.7rem; transition: 0.3s; }
        .lang-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(0, 212, 255, 0.1); }

        .glow { position: absolute; width: 450px; height: 450px; background: #0a2d3a; filter: blur(150px); opacity: 0.1; z-index: -1; top: 20%; left: 50%; transform: translateX(-50%); }

        .container { max-width: 800px; margin: 0 auto; }
        .game-logo { width: 320px; max-width: 80%; margin-bottom: 25px; filter: drop-shadow(0 0 15px rgba(0,212,255,0.25)); }
        
        h1 { font-family: 'Orbitron', sans-serif; font-size: 3rem; letter-spacing: 5px; color: #fff; margin-bottom: 10px; text-transform: uppercase; }
        .tagline { color: var(--primary); font-family: 'Orbitron', sans-serif; font-size: 1rem; letter-spacing: 6px; margin-bottom: 60px; text-transform: uppercase; font-weight: 500; }

        /* İndirme Butonları */
        .download-grid { display: grid; gap: 20px; margin-bottom: 80px; }
        .dl-btn { 
            display: block; background: #1a1a1a; border: 1px solid #333; color: #fff; 
            padding: 20px; border-radius: 14px; text-decoration: none; 
            font-family: 'Orbitron', sans-serif; font-weight: 800; transition: 0.3s;
        }
        .dl-btn:hover { background: var(--primary); color: #000; border-color: var(--primary); }

        .back-btn { font-family: 'Orbitron', sans-serif; padding: 18px 45px; border-radius: 14px; text-decoration: none; font-weight: 800; font-size: 0.85rem; letter-spacing: 2px; transition: 0.3s ease; border: 2px solid #222; color: #555; display: inline-block; }
        .back-btn:hover { border-color: #444; color: #fff; }

        .footer { margin-top: 100px; color: #222; font-size: 0.7rem; letter-spacing: 3px; font-family: 'Orbitron', sans-serif; text-transform: uppercase; }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .dl-btn { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="lang-switcher">
        <button class="lang-btn" id="btn-tr" onclick="setLanguage('tr')">TR</button>
        <button class="lang-btn" id="btn-en" onclick="setLanguage('en')">EN</button>
    </div>

    <div class="glow"></div>

    <div class="container">
        <img src="knightlegion.png" alt="Knight Legion Logo" class="game-logo">
        
        <h1 id="text-title">KNIGHT LEGION</h1>
        <p class="tagline" id="text-tagline">DOWNLOAD NOW</p>

        <div class="download-grid">
            <a href="https://play.google.com/store/apps/details?id=com.manushart.knightlegion" class="dl-btn" target="_blank">GOOGLE PLAY</a>
            <a href="https://apps.apple.com/us/app/knight-legion-rpg-strategy/id6760857277" class="dl-btn" target="_blank">APP STORE</a>
            <a href="https://store.steampowered.com/app/4686310/Knight_Legion_Rpg_Strategy" class="dl-btn" target="_blank">STEAM</a>
        </div>

        <div class="back-link-container">
            <a href="index.html" class="back-btn" id="text-back">← BACK TO HOME</a>
        </div>

        <div class="footer" id="text-footer">
            © 2026 MANUSHART // KNIGHT LEGION PROJECT // EST. Netherlands
        </div>
    </div>

    <script>
        const translations = {
            en: {
                title: "KNIGHT LEGION",
                tagline: "DOWNLOAD NOW",
                back: "← BACK TO HOME",
                footer: "© 2026 MANUSHART // KNIGHT LEGION PROJECT // EST. NETHERLANDS"
            },
            tr: {
                title: "KNIGHT LEGION",
                tagline: "HEMEN İNDİR",
                back: "← ANA SAYFAYA DÖN",
                footer: "© 2026 MANUSHART // KNIGHT LEGION PROJECT // EST. NETHERLANDS"
            }
        };

        function setLanguage(lang) {
            document.getElementById('text-title').innerText = translations[lang].title;
            document.getElementById('text-tagline').innerText = translations[lang].tagline;
            document.getElementById('text-back').innerText = translations[lang].back;
            document.getElementById('text-footer').innerText = translations[lang].footer;

            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
            localStorage.setItem('preferredLang', lang);
        }

        window.onload = function() {
            const savedLang = localStorage.getItem('preferredLang') || 'en';
            setLanguage(savedLang);
        };
    </script>
</body>
</html>
