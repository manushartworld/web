<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knight Legion: RPG Strategy | Manushart</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;800&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d4ff; --bg: #0a0a0a; --text: #f0f0f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; text-align: center; }
        
        .game-logo { width: 300px; max-width: 80%; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(0,212,255,0.3)); }
        
        h1 { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; letter-spacing: 3px; color: #fff; margin-bottom: 10px; }
        .tagline { color: var(--primary); font-family: 'Orbitron', sans-serif; font-size: 1rem; letter-spacing: 5px; margin-bottom: 50px; }

        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 30px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .video-card { 
            background: #111; 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid #222; 
            transition: 0.3s;
        }
        .video-card:hover { border-color: var(--primary); transform: translateY(-5px); }

        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .back-link { margin-top: 60px; display: inline-block; color: #555; text-decoration: none; font-family: 'Orbitron', sans-serif; font-size: 0.8rem; letter-spacing: 2px; }
        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>

    <img src="knightlegion.png" alt="Knight Legion Logo" class="game-logo">
    
    <h1>KNIGHT LEGION</h1>
    <p class="tagline">RPG STRATEGY</p>

    <div class="video-grid">
        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/uJHVWmzmvfc" allowfullscreen></iframe>
            </div>
        </div>
        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/zVDLN0mUTgU" allowfullscreen></iframe>
            </div>
        </div>
        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/30OASH8yJJY" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <a href="index.html" class="back-link">← ANA SAYFAYA DÖN</a>

</body>
</html>
