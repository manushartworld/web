<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Manushart Studio</title>
    
    <link rel="icon" type="image/png" href="manushart-logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;800&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00d4ff; --bg: #050505; --card: #111; --text: #f0f0f0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            align-items: center; 
            justify-content: center; 
            overflow-x: hidden; 
        }
        
        .glow { 
            position: absolute; 
            width: 400px; 
            height: 400px; 
            background: var(--primary); 
            filter: blur(150px); 
            opacity: 0.05; 
            z-index: -1; 
        }

        .container { text-align: center; padding: 40px; max-width: 600px; z-index: 1; }

        h1 { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 2.5rem; 
            font-weight: 800; 
            margin-bottom: 30px; 
            letter-spacing: 5px; 
            color: #ffffff;
            text-transform: uppercase;
        }

        .contact-card {
            background: var(--card);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid #1a1a1a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .contact-info { margin-bottom: 30px; }
        .contact-info p { color: #888; margin: 10px 0; font-size: 1rem; }
        .contact-email { 
            display: block;
            font-family: 'Orbitron', sans-serif;
            color: var(--primary); 
            font-size: 1.2rem; 
            text-decoration: none;
            margin-top: 15px;
            letter-spacing: 1px;
        }
        .contact-email:hover { text-shadow: 0 0 15px rgba(0, 212, 255, 0.5); }

        .back-btn { 
            margin-top: 50px;
            font-family: 'Orbitron', sans-serif;
            display: inline-block;
            color: #444;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .back-btn:hover { color: var(--primary); }

        .footer { margin-top: 60px; color: #222; font-size: 0.65rem; letter-spacing: 3px; font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>
    <div class="glow"></div>

    <div class="container">
        <h1>GET IN TOUCH</h1>

        <div class="contact-card">
            <div class="contact-info">
                <p>For business inquiries, collaborations, or support:</p>
                <a href="mailto:info@manushart.com" class="contact-email">info@manushart.com</a>
            </div>
            <p style="font-size: 0.8rem; color: #444;">Based in Netherlands // Global Operations</p>
        </div>

        <a href="index.html" class="back-btn">← BACK TO HOME</a>

        <div class="footer">
            MANUSHART WORLDWIDE // 2026
        </div>
    </div>
</body>
</html>
