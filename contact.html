<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Manushart | Send Us a Message</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0a0a; --panel: #161616; --text: #e0e0e0; --input-bg: #1f1f1f; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        .contact-panel { max-width: 550px; width: 100%; padding: 40px; background: var(--panel); border-radius: 15px; border: 1px solid #222; box-shadow: 0 15px 40px rgba(0,0,0,0.6); animation: slideIn 0.5s ease-out; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }

        h1 { color: var(--primary); text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-bottom: 10px; }
        p.subtitle { text-align: center; color: #888; margin-bottom: 40px; }

        form { text-align: left; }
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; color: #aaa; font-size: 0.95rem; }
        input, textarea { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #333; background-color: var(--input-bg); color: #fff; box-sizing: border-box; font-size: 1rem; transition: border-color 0.3s, box-shadow 0.3s; }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); }
        textarea { resize: vertical; }

        /* Shimmering Send Button */
        button { width: 100%; padding: 18px; font-size: 1.1rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: #1a1a1a; background: linear-gradient(120deg, #0099bb, var(--primary), #00d4ff); background-size: 200% 100%; animation: shimmer 3s infinite; border: none; border-radius: 8px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 212, 255, 0.4); }
        
        @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

        .back-home { text-align: center; margin-top: 30px; font-size: 0.9rem; }
        .back-home a { color: #666; text-decoration: none; }
        .back-home a:hover { color: var(--primary); }
    </style>
</head>
<body>
    <div class="contact-panel">
        <h1>Contact Us</h1>
        <p class="subtitle">Have questions or feedback about our games? Drop us a line.</p>

        <form action="https://formspree.io/f/manushartworld@gmail.com" method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="_replyto" placeholder="john.doe@email.com" required>
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea name="message" rows="6" placeholder="Your message here..." required></textarea>
            </div>

            <button type="submit">Send Message</button>
        </form>

        <div class="back-home">
            <a href="index.html">&larr; Back to Manushart Home</a>
        </div>
    </div>
</body>
</html>
