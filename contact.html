<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Manushart Studio</title>
    
    <link rel="icon" type="image/png" href="manushart-logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;800&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00d4ff; --bg: #050505; --card: #111; --text: #f0f0f0; --input-bg: #1a1a1a; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            align-items: center; 
            justify-content: center; 
            overflow-x: hidden; 
        }
        
        .glow { 
            position: absolute; 
            width: 400px; 
            height: 400px; 
            background: var(--primary); 
            filter: blur(150px); 
            opacity: 0.05; 
            z-index: -1; 
        }

        .container { text-align: center; padding: 40px; width: 100%; max-width: 500px; z-index: 1; }

        h1 { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 2.2rem; 
            font-weight: 800; 
            margin-bottom: 30px; 
            letter-spacing: 5px; 
            color: #ffffff;
            text-transform: uppercase;
        }

        /* FORM STYLES */
        .contact-form {
            background: var(--card);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid #222;
            text-align: left;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .form-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            font-family: 'Orbitron', sans-serif; 
            font-size: 0.7rem; 
            color: var(--primary); 
            margin-bottom: 8px; 
            letter-spacing: 1px;
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            background: var(--input-bg);
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
        }

        textarea { height: 120px; resize: none; }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
            transform: translateY(-2px);
        }

        .back-btn { 
            margin-top: 40px;
            font-family: 'Orbitron', sans-serif;
            display: inline-block;
            color: #444;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .back-btn:hover { color: var(--primary); }

        .footer { margin-top: 60px; color: #222; font-size: 0.6rem; letter-spacing: 3px; font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>
    <div class="glow"></div>

    <div class="container">
        <h1>GET IN TOUCH</h1>

        <form class="contact-form" action="mailto:info@manushart.com" method="post" enctype="text/plain">
            <div class="form-group">
                <label>FULL NAME</label>
                <input type="text" name="name" placeholder="Enter your name" required>
            </div>
            
            <div class="form-group">
                <label>EMAIL ADDRESS</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>MESSAGE</label>
                <textarea name="message" placeholder="How can we help you?" required></textarea>
            </div>

            <button type="submit" class="submit-btn">SEND MESSAGE</button>
        </form>

        <a href="index.html" class="back-btn">← BACK TO HOME</a>

        <div class="footer">
            MANUSHART WORLDWIDE // 2026
        </div>
    </div>
</body>
</html>
