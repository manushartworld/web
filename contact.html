<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Manushart | Studio Support</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0a0a; --panel: #161616; --text: #e0e0e0; --input-bg: #1f1f1f; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        .contact-panel { max-width: 500px; width: 100%; padding: 40px; background: var(--panel); border-radius: 20px; border: 1px solid #222; box-shadow: 0 20px 50px rgba(0,0,0,0.8); animation: slideIn 0.6s ease-out; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: var(--primary); text-transform: uppercase; letter-spacing: 3px; text-align: center; margin-bottom: 10px; font-size: 2rem; }
        p.subtitle { text-align: center; color: #888; margin-bottom: 40px; font-size: 0.95rem; }

        form { text-align: left; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #aaa; font-size: 0.9rem; font-weight: 600; }
        
        input, textarea { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #333; background-color: var(--input-bg); color: #fff; box-sizing: border-box; font-size: 1rem; transition: all 0.3s ease; }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 15px rgba(0, 212, 255, 0.15); background-color: #252525; }
        
        textarea { resize: none; }

        /* Premium Shimmer Button */
        button { width: 100%; padding: 18px; font-size: 1.1rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; color: #0a0a0a; background: linear-gradient(120deg, #0099bb, var(--primary), #00d4ff); background-size: 200% 100%; border: none; border-radius: 10px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; animation: shimmer 4s infinite linear; }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0, 212, 255, 0.4); }
        button:active { transform: translateY(-1px); }
        
        @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

        .back-home { text-align: center; margin-top: 35px; }
        .back-home a { color: #555; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .back-home a:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div class="contact-panel">
        <h1>Contact Us</h1>
        <p class="subtitle">Have a question? We'll get back to you as soon as possible.</p>

        <form action="https://formspree.io/f/xpqyblvp" method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label>Your Message</label>
                <textarea name="message" rows="5" placeholder="How can we help?" required></textarea>
            </div>

            <button type="submit">Send Message</button>
        </form>

        <div class="back-home">
            <a href="index.html">&larr; Return to Manushart Home</a>
        </div>
    </div>

</body>
</html>
