<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manushart | Game Development Studio</title>
    
    <link rel="icon" type="image/png" href="manushart-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;800&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00d4ff; --bg: #050505; --card: #111; --text: #f0f0f0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            align-items: center; 
            justify-content: center; 
            overflow-x: hidden; 
        }
        
        .glow { 
            position: absolute; 
            width: 450px; 
            height: 450px; 
            background: var(--primary); 
            filter: blur(160px); 
            opacity: 0.08; 
            z-index: -1; 
            top: 15%; 
            left: 50%; 
            transform: translateX(-50%); 
        }

        .container { text-align: center; padding: 40px; max-width: 900px; z-index: 1; animation: fadeIn 1.2s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* LOGO TASARIMI - DİKDÖRTGEN DÜZELTME */
        .logo-container { margin-bottom: 20px; }
        .main-logo { 
            width: 380px; /* Genişliği artırdım ki dikdörtgen logo rahatlasın */
            height: auto; /* Boyu otomatik ayarlansın, basık durmasın */
            max-width: 90vw; /* Mobilde ekrandan taşmasın */
            filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.2)); 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .main-logo:hover { transform: scale(1.05); filter: drop-shadow(0 0 35px rgba(0, 212, 255, 0.4)); }

        h1 { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 3.5rem; 
            font-weight: 800; 
            margin: 0; 
            letter-spacing: 10px; 
            text-transform: uppercase;
            color: #ffffff;
        }
        
        .brand-art { 
            color: var(--primary); 
            text-shadow: 0 0 25px rgba(0, 212, 255, 0.5); 
        }

        p.studio-tag { 
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem; 
            color: #444; 
            margin-top: 12px; 
            letter-spacing: 6px; 
            text-transform: uppercase;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 60px; }
        <div style="margin-top: 50px; padding: 20px; border: 1px dashed var(--primary); border-radius: 15px; background: rgba(0, 212, 255, 0.05);">
    <h4 style="font-family: 'Orbitron', sans-serif; color: var(--primary); margin: 0; letter-spacing: 2px;">ONGOING PROJECT</h4>
    <p style="color: #fff; font-weight: bold; margin: 10px 0;">Knight Legion: RPG Strategy</p>
    <p style="font-size: 0.9rem; color: #888;">Destansı savaşlara ve stratejik derinliğe hazır olun. Çok yakında yayında!</p>
    <a href="knight-legion.html" target="_blank" class="btn btn-main" style="display: inline-block; margin-top: 15px; padding: 12px 30px;">İNCELE & BİLGİ AL</a>
</div>
        .card { 
            background: rgba(17, 17, 17, 0.8); 
            padding: 35px; 
            border-radius: 22px; 
            border: 1px solid #1a1a1a; 
            text-align: left;
            transition: 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .card:hover { border-color: var(--primary); background: #161616; transform: translateY(-5px); }
        .card h3 { font-family: 'Orbitron', sans-serif; color: #fff; margin-bottom: 15px; font-size: 1.1rem; letter-spacing: 1px; }
        .card p { color: #888; font-size: 0.95rem; line-height: 1.7; margin: 0; }

        .btn-group { margin-top: 70px; display: flex; gap: 25px; justify-content: center; }
        .btn { 
            font-family: 'Orbitron', sans-serif;
            padding: 18px 50px; 
            border-radius: 14px; 
            text-decoration: none; 
            font-weight: 800; 
            font-size: 0.9rem; 
            letter-spacing: 2px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .btn-main { background: var(--primary); color: #050505; border: 2px solid var(--primary); }
        .btn-main:hover { background: transparent; color: var(--primary); box-shadow: 0 0 30px rgba(0, 212, 255, 0.3); }
        
        .btn-sub { border: 2px solid #222; color: #666; }
        .btn-sub:hover { border-color: #444; color: #fff; }

        .footer { 
            margin-top: 100px; 
            color: #222; 
            font-size: 0.7rem; 
            letter-spacing: 3px; 
            font-family: 'Orbitron', sans-serif; 
            text-transform: uppercase;
        }
        .footer a { color: inherit; text-decoration: none; transition: 0.3s; }
        .footer a:hover { color: #444; }
    </style>
</head>
<body>
    <div class="glow"></div>

    <div class="container">
        <div class="logo-container">
            <img src="manushart-logo.png" alt="Manushart Logo" class="main-logo">
        </div>
        
        <h1>MANUSH<span class="brand-art">ART</span></h1>
        <p class="studio-tag">Game Development Studio</p>

        <div class="grid">
            <div class="card">
                <h3>VIRTUAL WORLDS</h3>
                <p>Crafting immersive gaming experiences with artistic passion and high-end technology.</p>
            </div>
            <div class="card">
                <h3>SECURE SYSTEMS</h3>
                <p>Advanced architectural solutions backed by 24 years of software expertise.</p>
            </div>
        </div>

        <div class="btn-group">
            <a href="contact.html" class="btn btn-main">CONTACT</a>
            <a href="privacy.html" class="btn btn-sub">PRIVACY</a>
        </div>

        <div class="footer">
            EST. 2026 // MANUSHART WORLDWIDE // <a href="index.html">REFRESH</a>
        </div>
    </div>
</body>
</html>
