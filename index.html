<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manushart | Game Development Studio</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0a0a; --panel: #161616; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; overflow: hidden; }
        
        .hero { text-align: center; max-width: 800px; padding: 60px; background: var(--panel); border-radius: 20px; border: 1px solid #222; box-shadow: 0 15px 50px rgba(0,0,0,0.7); position: relative; animation: fadeIn 1s ease-out; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: var(--primary); font-size: 4rem; text-transform: uppercase; letter-spacing: 5px; margin: 0 0 10px 0; background: linear-gradient(to right, #0099bb 0%, var(--primary) 50%, #0099bb 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer h1 5s infinite; }
        .tagline { font-style: italic; color: #888; font-size: 1.2rem; margin-bottom: 50px; }

        .about { margin: 40px 0; font-size: 1.1rem; line-height: 1.8; color: #aaa; }

        /* Shimmering Contact Button */
        .btn-contact { display: inline-block; padding: 18px 45px; font-size: 1.1rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; color: #1a1a1a; text-decoration: none; border-radius: 50px; background: linear-gradient(120deg, #0099bb, var(--primary), #00d4ff); background-size: 200% 100%; animation: shimmer 3s infinite; box-shadow: 0 10px 20px rgba(0, 212, 255, 0.3); transition: transform 0.2s, box-shadow 0.2s; }
        .btn-contact:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 212, 255, 0.5); }
        .btn-contact:active { transform: translateY(-1px); }

        @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

        .footer { margin-top: 60px; font-size: 0.85rem; color: #444; }
        .footer a { color: #555; text-decoration: none; margin: 0 10px; }
        .footer a:hover { color: var(--primary); }
    </style>
</head>
<body>
    <div class="hero">
        <h1>MANUSHART</h1>
        <p class="tagline">Crafting Immersive Mobile Experiences</p>
        
        <div class="about">
            <p>Manushart is an independent studio dedicated to developing high-quality games and applications for mobile platforms. Our focus is on innovation, user privacy, and secure architectural solutions.</p>
        </div>

        <a href="contact.html" class="btn-contact">Contact Us</a>

        <div class="footer">
            &copy; 2026 Manushart | <a href="privacy.html">Privacy Policy</a>
        </div>
    </div>
</body>
</html>
